<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Judo - Technical Fundamentals</title>
    <meta name="description" content="List of all Judo techniques separated by category">

    <style>
        :root {
            --background: #f4f6f8;
            --surface: #ffffff;
            --surface-soft: #f8fafc;
            --text: #20242a;
            --muted: #5d6773;
            --primary: #9f1d20;
            --primary-dark: #741316;
            --border: #dce2e8;
            --shadow: 0 12px 30px rgba(20, 28, 38, 0.08);
            --radius: 16px;
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            background: var(--background);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                Helvetica, Arial, sans-serif;
            line-height: 1.6;
        }

        a {
            color: var(--primary);
        }

        a:hover {
            color: var(--primary-dark);
        }

        .site-header {
            background:
                linear-gradient(rgba(26, 12, 13, 0.76), rgba(26, 12, 13, 0.76)),
                linear-gradient(135deg, #8f171b, #241416);
            color: white;
            padding: 56px 20px 42px;
            text-align: center;
        }

        .site-header h1 {
            margin: 0;
            font-size: clamp(2rem, 6vw, 3.6rem);
            line-height: 1.1;
        }

        .site-header p {
            max-width: 760px;
            margin: 16px auto 0;
            color: rgba(255, 255, 255, 0.86);
            font-size: 1.05rem;
        }

        .page-layout {
            width: min(1180px, calc(100% - 32px));
            margin: 28px auto 56px;
            display: grid;
            grid-template-columns: 250px minmax(0, 1fr);
            gap: 28px;
            align-items: start;
        }

        .sidebar {
            position: sticky;
            top: 18px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 20px;
        }

        .sidebar h2 {
            margin: 0 0 12px;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--muted);
        }

        .sidebar nav {
            display: grid;
            gap: 7px;
        }

        .sidebar a {
            display: block;
            padding: 9px 11px;
            border-radius: 9px;
            color: var(--text);
            text-decoration: none;
            font-weight: 600;
        }

        .sidebar a:hover {
            background: #f4e8e9;
            color: var(--primary);
        }

        main {
            min-width: 0;
        }

        .intro {
            margin-bottom: 24px;
            padding: 20px 22px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-left: 5px solid var(--primary);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .intro p {
            margin: 0;
            color: var(--muted);
        }

        .content h3 {
            margin: 42px 0 18px;
            padding-bottom: 10px;
            border-bottom: 3px solid var(--primary);
            font-size: clamp(1.5rem, 3vw, 2rem);
        }

        .content h3:first-child {
            margin-top: 0;
        }

        .wp-block-table {
            margin: 0 0 28px;
            overflow-x: auto;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 650px;
        }

        th,
        td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            vertical-align: top;
        }

        th {
            background: var(--primary);
            color: white;
            text-align: left;
            font-size: 1.08rem;
        }

        th a {
            color: white;
        }

        tr:last-child td {
            border-bottom: 0;
        }

        tbody tr:nth-child(even) td {
            background: var(--surface-soft);
        }

        td:first-child:not([colspan]) {
            width: 62px;
            text-align: center;
            font-weight: 700;
            color: var(--primary);
        }

        td a {
            font-weight: 750;
            text-decoration-thickness: 1px;
            text-underline-offset: 3px;
        }

        td.prohibited {
            font-style: italic;
        }

        td.prohibited a {
            color: blue;
        }

        td img {
            display: block;
            max-width: min(100%, 480px);
            height: auto;
            margin: 0 auto 10px;
            border-radius: 12px;
        }

        [data-align="center"],
        .has-text-align-center {
            text-align: center;
        }

        .site-footer {
            padding: 24px 20px;
            background: #20242a;
            color: #dbe1e7;
            text-align: center;
        }

        .site-footer p {
            margin: 0;
        }

        .back-to-top {
            position: fixed;
            right: 18px;
            bottom: 18px;
            width: 46px;
            height: 46px;
            display: grid;
            place-items: center;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            text-decoration: none;
            box-shadow: var(--shadow);
            font-size: 1.25rem;
            font-weight: bold;
        }

        .back-to-top:hover {
            background: var(--primary-dark);
            color: white;
        }

        @media (max-width: 900px) {
            .page-layout {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: static;
            }

            .sidebar nav {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 580px) {
            .site-header {
                padding: 42px 18px 34px;
            }

            .page-layout {
                width: min(100% - 20px, 1180px);
                margin-top: 18px;
            }

            .sidebar nav {
                grid-template-columns: 1fr;
            }

            th,
            td {
                padding: 12px;
            }

            .back-to-top {
                right: 12px;
                bottom: 12px;
            }
        }
    </style>
</head>
